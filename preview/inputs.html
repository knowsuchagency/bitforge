<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .stack { display: flex; flex-direction: column; gap: 12px; max-width: 480px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .flabel { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); font-weight: 600; }
  .input {
    font-family: var(--font-mono); font-size: 14px;
    background: var(--bg-3); border: 2px solid var(--border-1); color: var(--fg-1);
    padding: 8px 12px; border-radius: 2px;
  }
  .input:focus { outline: none; border-color: var(--bf-orange); }
  .prompt {
    background: var(--bg-3); border: 2px solid var(--border-1); padding: 8px 12px;
    display: flex; align-items: center; gap: 8px; border-radius: 2px;
  }
  .prompt::before { content: "$"; color: var(--bf-orange); font-weight: 700; }
  .prompt input { background: transparent; border: none; outline: none; color: var(--fg-1); font: inherit; flex: 1; }
  .copy { color: var(--fg-3); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; }
  .copy:hover { color: var(--fg-1); }
</style></head>
<body>
  <div class="label">## inputs</div>
  <div class="stack">
    <div class="field">
      <div class="flabel">workspace</div>
      <input class="input" value="anvil/build-pipeline" />
    </div>
    <div class="prompt">
      <input value="brew install bitforge" />
      <span class="copy">copy</span>
    </div>
  </div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Badges & Status Dots</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }

  .badge {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    padding: 4px 8px; border: 1px solid; border-radius: 2px;
    display: inline-flex; align-items: center; gap: 6px;
    text-transform: lowercase;
  }
  .b-github   { background: rgba(255,255,255,0.04); color: var(--fg-1); border-color: var(--border-2); }
  .b-s3       { background: rgba(255,107,26,0.08); color: var(--bf-orange-hot); border-color: var(--bf-orange-deep); }
  .b-gdrive   { background: rgba(90,176,255,0.08); color: var(--term-blue); border-color: rgba(90,176,255,0.4); }
  .b-local    { background: rgba(46,230,168,0.08); color: var(--term-green); border-color: rgba(46,230,168,0.4); }
  .b-warn     { background: rgba(242,179,61,0.08); color: var(--term-amber); border-color: rgba(242,179,61,0.4); }

  .live { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 9999px; }
  .dot-live { background: var(--term-green); box-shadow: 0 0 8px var(--term-green); animation: pulse 1.6s infinite; }
  .dot-warn { background: var(--term-amber); }
  .dot-err { background: var(--term-red); }
  .dot-idle { background: var(--fg-3); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
</style></head>
<body>
  <div class="label">## badges &amp; status</div>
  <div class="row">
    <span class="badge b-github">github</span>
    <span class="badge b-s3">s3</span>
    <span class="badge b-gdrive">gdrive</span>
    <span class="badge b-local">local</span>
    <span class="badge b-warn">staged</span>
  </div>
  <div class="row">
    <span class="live"><span class="dot dot-live"></span><span style="color:var(--term-green)">LIVE</span></span>
    <span class="live"><span class="dot dot-warn"></span><span style="color:var(--term-amber)">PENDING</span></span>
    <span class="live"><span class="dot dot-err"></span><span style="color:var(--term-red)">FAILED</span></span>
    <span class="live"><span class="dot dot-idle"></span><span style="color:var(--fg-3)">IDLE</span></span>
  </div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Surfaces (Dark)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border: 2px solid var(--border-1); }
  .chip { height: 64px; border-bottom: 2px solid var(--border-1); }
  .meta { padding: 8px 10px; background: var(--bg-1); }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 600; }
  .hex { font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="label">## surfaces · dark</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#0A0908"></div><div class="meta"><div class="name">bg-0</div><div class="hex">#0A0908 · page</div></div></div>
    <div class="swatch"><div class="chip" style="background:#121110"></div><div class="meta"><div class="name">bg-1</div><div class="hex">#121110 · card</div></div></div>
    <div class="swatch"><div class="chip" style="background:#1A1816"></div><div class="meta"><div class="name">bg-2</div><div class="hex">#1A1816 · raised</div></div></div>
    <div class="swatch"><div class="chip" style="background:#232120"></div><div class="meta"><div class="name">bg-3</div><div class="hex">#232120 · input</div></div></div>
  </div>
</body></html>

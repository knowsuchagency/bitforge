<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing — 4px Grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 80px 60px 1fr; gap: 12px; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--border-1); font-size: 12px; }
  .row:last-child { border: none; }
  .name { color: var(--fg-1); font-weight: 600; }
  .px { color: var(--fg-3); }
  .bar { background: var(--bf-orange); height: 14px; }
</style></head>
<body>
  <div class="label">## spacing · 4px base grid</div>
  <div class="row"><div class="name">--s-1</div><div class="px">4 px</div><div><div class="bar" style="width:4px"></div></div></div>
  <div class="row"><div class="name">--s-2</div><div class="px">8 px</div><div><div class="bar" style="width:8px"></div></div></div>
  <div class="row"><div class="name">--s-3</div><div class="px">12 px</div><div><div class="bar" style="width:12px"></div></div></div>
  <div class="row"><div class="name">--s-4</div><div class="px">16 px</div><div><div class="bar" style="width:16px"></div></div></div>
  <div class="row"><div class="name">--s-6</div><div class="px">24 px</div><div><div class="bar" style="width:24px"></div></div></div>
  <div class="row"><div class="name">--s-8</div><div class="px">32 px</div><div><div class="bar" style="width:32px"></div></div></div>
  <div class="row"><div class="name">--s-12</div><div class="px">48 px</div><div><div class="bar" style="width:48px"></div></div></div>
  <div class="row"><div class="name">--s-16</div><div class="px">64 px</div><div><div class="bar" style="width:64px"></div></div></div>
  <div class="row"><div class="name">--s-24</div><div class="px">96 px</div><div><div class="bar" style="width:96px"></div></div></div>
</body></html>

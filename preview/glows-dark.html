<!doctype html>
<html><head><meta charset="utf-8"><title>Glows — Dark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 32px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .ball { width: 48px; height: 48px; border-radius: 9999px; }
  .name { font-size: 12px; font-weight: 600; }
  .px { font-size: 11px; color: var(--fg-3); }
</style></head>
<body>
  <div class="label">## glow · used sparingly on dark</div>
  <div class="grid">
    <div class="item"><div class="ball" style="background:#FF6B1A;box-shadow:0 0 24px rgba(255,107,26,0.55)"></div><div class="name">glow-orange</div><div class="px">CTA · hot states</div></div>
    <div class="item"><div class="ball" style="background:#2EE6A8;box-shadow:0 0 16px rgba(46,230,168,0.6)"></div><div class="name">glow-green</div><div class="px">live · running</div></div>
    <div class="item"><div class="ball" style="background:#121110;border:2px solid #2A2825;box-shadow:0 8px 32px rgba(0,0,0,0.5)"></div><div class="name">glow-soft</div><div class="px">elevated panel</div></div>
  </div>
</body></html>

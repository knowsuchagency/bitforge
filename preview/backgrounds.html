<!doctype html>
<html><head><meta charset="utf-8"><title>Backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 14px; font-family: var(--font-mono); color: var(--fg-1); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tile { height: 130px; border: 2px solid var(--border-1); position: relative; overflow: hidden; }
  .tile .name { position: absolute; bottom: 8px; left: 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 6px; background: rgba(0,0,0,0.6); border: 1px solid var(--border-1); }

  .b-glow { background: var(--bg-0); }
  .b-glow::before {
    content: ""; position: absolute; inset: -40%;
    background: radial-gradient(ellipse at 30% 50%, rgba(255,107,26,0.35) 0%, rgba(255,107,26,0) 55%);
  }
  .b-grid-dark {
    background-color: var(--bg-0);
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .b-grid-paper {
    background-color: var(--paper-0);
    background-image:
      linear-gradient(rgba(10,9,8,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,9,8,0.08) 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .b-grid-paper .name { background: rgba(242,238,228,0.85); color: var(--ink-1); border-color: var(--ink-1); }
  .b-scan {
    background:
      repeating-linear-gradient(0deg, rgba(255,107,26,0.08) 0 1px, transparent 1px 3px),
      var(--bg-0);
  }
</style></head>
<body>
  <div class="grid">
    <div class="tile b-glow"><div class="name">orange glow</div></div>
    <div class="tile b-grid-dark"><div class="name">dot grid · dark</div></div>
    <div class="tile b-grid-paper"><div class="name">grid · paper</div></div>
    <div class="tile b-scan"><div class="name">CRT scanlines</div></div>
  </div>
</body></html>

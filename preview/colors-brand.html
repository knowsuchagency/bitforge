<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border: 2px solid var(--border-1); padding: 0; }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--bg-1); border-top: 2px solid var(--border-1); }
  .name { font-size: 12px; color: var(--fg-1); font-weight: 600; }
  .hex { font-size: 11px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="label">## brand · the orange</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#FF6B1A"></div><div class="meta"><div class="name">orange</div><div class="hex">#FF6B1A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#FF8533"></div><div class="meta"><div class="name">orange-hot</div><div class="hex">#FF8533</div></div></div>
    <div class="swatch"><div class="chip" style="background:#D9520A"></div><div class="meta"><div class="name">orange-deep</div><div class="hex">#D9520A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#7A3410"></div><div class="meta"><div class="name">orange-dim</div><div class="hex">#7A3410</div></div></div>
  </div>
</body></html>

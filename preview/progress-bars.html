<!doctype html>
<html><head><meta charset="utf-8"><title>Progress Bars</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 100px 1fr 50px; gap: 14px; align-items: center; padding: 10px 0; font-size: 13px; }
  .name { color: var(--fg-1); }
  .pct { color: var(--fg-2); text-align: right; font-variant-numeric: tabular-nums; }
  .track { background: var(--bg-3); height: 10px; border: 1px solid var(--border-1); position: relative; overflow: hidden; }
  .fill { height: 100%; background: var(--bf-orange); }
  .fill-step {
    background: repeating-linear-gradient(90deg, var(--bf-orange) 0 8px, var(--bf-orange-deep) 8px 9px);
    height: 100%;
  }
  .fill-green { background: var(--term-green); }
  .fill-amber { background: var(--term-amber); }
</style></head>
<body>
  <div class="label">## progress · 8-bit step bars</div>
  <div class="row"><div class="name">analyst</div><div class="track"><div class="fill-step" style="width:64%"></div></div><div class="pct">64%</div></div>
  <div class="row"><div class="name">doc-writer</div><div class="track"><div class="fill-step" style="width:41%"></div></div><div class="pct">41%</div></div>
  <div class="row"><div class="name">build</div><div class="track"><div class="fill fill-green" style="width:100%"></div></div><div class="pct">100%</div></div>
  <div class="row"><div class="name">restoring</div><div class="track"><div class="fill fill-amber" style="width:23%"></div></div><div class="pct">23%</div></div>
</body></html>

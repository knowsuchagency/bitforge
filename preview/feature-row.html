<!doctype html>
<html><head><meta charset="utf-8"><title>Feature Row</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 22px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; }
  .item { display: flex; align-items: flex-start; gap: 12px; }
  .ico { width: 28px; height: 28px; color: var(--term-green); flex: none; }
  .text .t { font-size: 14px; font-weight: 700; color: var(--fg-1); margin-bottom: 4px; }
  .text .d { font-size: 12px; color: var(--fg-2); line-height: 1.5; }
</style></head>
<body>
  <div class="row">
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="6" y1="9" x2="6" y2="15"/><path d="M18 9a6 6 0 0 1-6 6"/><circle cx="18" cy="6" r="3"/></svg>
      <div class="text"><div class="t">Reversible by default</div><div class="d">Roll back any agent run with one command</div></div>
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <div class="text"><div class="t">One filesystem</div><div class="d">GitHub, S3, and Drive as a single ~/sandbox</div></div>
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <div class="text"><div class="t">Contained by default</div><div class="d">Isolated runs, every network call audited</div></div>
    </div>
    <div class="item">
      <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
      <div class="text"><div class="t">You stay in control</div><div class="d">Per-action policies and human approval gates</div></div>
    </div>
  </div>
</body></html>

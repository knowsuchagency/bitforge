<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic Terminal</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--bg-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--fg-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--fg-3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .swatch { border: 2px solid var(--border-1); }
  .chip { height: 56px; display:flex; align-items:center; justify-content:center; }
  .dot { width: 12px; height: 12px; border-radius: 9999px; }
  .meta { padding: 6px 8px; background: var(--bg-1); border-top: 2px solid var(--border-1); }
  .name { font-size: 11px; color: var(--fg-1); font-weight: 600; }
  .hex { font-size: 10px; color: var(--fg-3); margin-top: 2px; }
</style></head>
<body>
  <div class="label">## semantic · terminal palette</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#0F1A14"><div class="dot" style="background:#2EE6A8;box-shadow:0 0 12px #2EE6A8"></div></div><div class="meta"><div class="name">green</div><div class="hex">#2EE6A8 · live</div></div></div>
    <div class="swatch"><div class="chip" style="background:#1A1407"><div class="dot" style="background:#F2B33D"></div></div><div class="meta"><div class="name">amber</div><div class="hex">#F2B33D · warn</div></div></div>
    <div class="swatch"><div class="chip" style="background:#1A0E0E"><div class="dot" style="background:#FF5A5A"></div></div><div class="meta"><div class="name">red</div><div class="hex">#FF5A5A · err</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0E1620"><div class="dot" style="background:#5AB0FF"></div></div><div class="meta"><div class="name">blue</div><div class="hex">#5AB0FF · info</div></div></div>
    <div class="swatch"><div class="chip" style="background:#16101F"><div class="dot" style="background:#C78BFF"></div></div><div class="meta"><div class="name">purple</div><div class="hex">#C78BFF · 2nd</div></div></div>
  </div>
</body></html>

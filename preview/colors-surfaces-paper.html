<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Surfaces (Paper)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; }
  body { background: var(--paper-0); padding: 24px 28px; font-family: var(--font-mono); color: var(--ink-1); }
  .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border: 2px solid var(--ink-1); }
  .chip { height: 64px; border-bottom: 2px solid var(--ink-1); }
  .meta { padding: 8px 10px; background: var(--paper-1); }
  .name { font-size: 12px; color: var(--ink-1); font-weight: 600; }
  .hex { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style></head>
<body>
  <div class="label">## surfaces · paper (light)</div>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#F2EEE4"></div><div class="meta"><div class="name">paper-0</div><div class="hex">#F2EEE4 · page</div></div></div>
    <div class="swatch"><div class="chip" style="background:#EAE5D8"></div><div class="meta"><div class="name">paper-1</div><div class="hex">#EAE5D8 · card</div></div></div>
    <div class="swatch"><div class="chip" style="background:#DCD6C5"></div><div class="meta"><div class="name">paper-2</div><div class="hex">#DCD6C5 · raised</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0A0908"></div><div class="meta"><div class="name">ink-1</div><div class="hex">#0A0908 · text</div></div></div>
  </div>
</body></html>
